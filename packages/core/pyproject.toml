[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-toolbelt-core"
version = "0.1.0"
description = "Shared helpers and packaged assets for agent-toolbelt family packages."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Darkaxt" }]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
agent_toolbelt_core = ["assets/*.py", "assets/*.ps1", "assets/*.bat", "assets/gemini-workspace/*.md"]
